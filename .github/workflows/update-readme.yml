name: Update README Activity
on:
  schedule:
    - cron: "0 * * * *" # Berjalan otomatis setiap jam
  workflow_dispatch: # Memungkinkan kamu menjalankan manual jika ingin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "Update recent activity in README"
          MAX_LINES: 5
