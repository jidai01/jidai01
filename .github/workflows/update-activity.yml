name: Update Profile README
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Izin khusus untuk menulis ke repo
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Update Recent Activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "⚡ Update recent activity"
          MAX_LINES: 5

      - name: Update Last Updated Date
        run: |
          DATE=$(date +'%d %B %Y')
          sed -i "//,//c\\n<i>Last updated on: $DATE<\/i>\n" README.md

      - name: Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update readme" && git push)
