name: Manual Update Profile
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch GitHub Activity & Update README
        run: |
          # 1. Ambil data aktivitas publik jidai01
          # Kita ambil 5 event terbaru dan ubah jadi list markdown
          ACTIVITY=$(curl -s "https://api.github.com/users/jidai01/events/public" | \
          jq -r '.[:5] | .[] | "- \(.type | sub("Event$"; "")) di [\(.repo.name)](https://github.com/\(.repo.name)) (\(.created_at | split("T")[0]))"' | \
          sed ':a;N;$!ba;s/\n/\\n/g')

          # 2. Update bagian Aktivitas menggunakan penanda baru
          sed -i "//,//c\\n$ACTIVITY\n" README.md

          # 3. Update bagian Tanggal
          DATE=$(date +'%d %B %Y')
          sed -i "//,//c\\n<i>Last updated on: $DATE<\/i>\n" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Hanya commit jika ada perubahan agar tidak error
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: manual update activity and date" && git push)
