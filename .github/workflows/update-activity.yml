name: Manual Update Profile
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch and Process Activity
        run: |
          # Ambil 5 aktivitas terbaru via API
          curl -s "https://api.github.com/users/jidai01/events/public" | \
          jq -r '.[:5] | .[] | "- \(.type | sub("Event$"; "")) di [\(.repo.name)](https://github.com/\(.repo.name)) (\(.created_at | split("T")[0]))"' > activity.txt || echo "" > activity.txt

          # Simpan tanggal hari ini
          echo "DATE=$(date +'%d %B %Y')" >> $GITHUB_ENV

      - name: Write to README using Python
        run: |
          python3 << 'EOF'
          import os

          # Definisikan Tag Penanda (Wajib sesuai dengan di README.md)
          START_ACT, END_ACT = "", ""
          START_DATE, END_DATE = "", ""

          # Ambil data aktivitas
          activity_content = "*Belum ada aktivitas terbaru.*"
          if os.path.exists('activity.txt'):
              with open('activity.txt', 'r') as f:
                  content = f.read().strip()
                  if content: activity_content = content

          # Baca README
          if not os.path.exists('README.md'):
              print("README.md tidak ditemukan!")
              exit(1)

          with open('README.md', 'r') as f:
              readme = f.read()

          # Update Aktivitas
          if START_ACT in readme and END_ACT in readme:
              parts = readme.split(START_ACT)
              after_parts = parts[1].split(END_ACT)
              readme = parts[0] + START_ACT + "\n" + activity_content + "\n" + END_ACT + after_parts[1]
          else:
              print("Tag Aktivitas tidak ditemukan di README!")

          # Update Tanggal
          date_now = os.environ.get('DATE', 'Unknown Date')
          if START_DATE in readme and END_DATE in readme:
              parts = readme.split(START_DATE)
              after_parts = parts[1].split(END_DATE)
              readme = parts[0] + START_DATE + "\n<i>Last updated on: " + date_now + "</i>\n" + END_DATE + after_parts[1]

          # Simpan hasil akhir
          with open('README.md', 'w') as f:
              f.write(readme)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update profile" && git push)
