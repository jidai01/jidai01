name: Manual Update Profile
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch and Process Activity
        run: |
          # Ambil 5 aktivitas terbaru via API
          curl -s "https://api.github.com/users/jidai01/events/public" | \
          jq -r '.[:5] | .[] | "- \(.type | sub("Event$"; "")) di [\(.repo.name)](https://github.com/\(.repo.name)) (\(.created_at | split("T")[0]))"' > activity.txt || echo "" > activity.txt

          # Simpan tanggal hari ini
          echo "DATE=$(date +'%d %B %Y')" >> $GITHUB_ENV

      - name: Write to README using Python
        run: |
          python3 << 'EOF'
          import os

          # Definisikan Tag Penanda (INI HARUS SAMA DENGAN DI README.MD)
          START_ACT = ""
          END_ACT = ""
          START_DATE = ""
          END_DATE = ""

          # 1. Ambil data aktivitas dari file sementara
          activity_content = "*Belum ada aktivitas terbaru.*"
          if os.path.exists('activity.txt'):
              with open('activity.txt', 'r') as f:
                  content = f.read().strip()
                  if content: 
                      activity_content = content

          # 2. Baca file README.md
          if not os.path.exists('README.md'):
              print("File README.md tidak ditemukan!")
              exit(1)
          with open('README.md', 'r') as f:
              readme = f.read()

          # 3. Update bagian Aktivitas
          if START_ACT in readme and END_ACT in readme:
              before = readme.split(START_ACT)[0]
              after = readme.split(END_ACT)[1]
              readme = f"{before}{START_ACT}\n{activity_content}\n{END_ACT}{after}"
          else:
              print("Tag Aktivitas tidak ditemukan di README.md")

          # 4. Update bagian Tanggal
          date_now = os.environ.get('DATE', 'Unknown Date')
          if START_DATE in readme and END_DATE in readme:
              before = readme.split(START_DATE)[0]
              after = readme.split(END_DATE)[1]
              readme = f"{before}{START_DATE}\n<i>Last updated on: {date_now}</i>\n{END_DATE}{after}"
          else:
              print("Tag Tanggal tidak ditemukan di README.md")

          # 5. Simpan kembali ke README.md
          with open('README.md', 'w') as f:
              f.write(readme)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update profile" && git push)
